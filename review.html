<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNSR Capital — Site Review</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1F3260;
    --navy-dk: #181D38;
    --stone: #F0ECE9;
    --stone-bd: #E0DADA;
    --gold: #A8A09A;
    --ink: #3D3D3D;
    --white: #ffffff;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: #0e1221;
    color: #F0ECE9;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: #181D38;
    border-bottom: 1px solid rgba(240,236,233,.08);
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 400;
    color: #F0ECE9; letter-spacing: .04em;
  }
  .header-sub {
    font-size: .60rem; font-weight: 500;
    letter-spacing: .20em; text-transform: uppercase;
    color: rgba(240,236,233,.35);
    margin-top: 3px;
  }
  .header-meta {
    font-size: .72rem; font-weight: 300;
    color: rgba(240,236,233,.4);
    letter-spacing: .04em;
  }
  .page-count {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 400;
    color: #A8A09A;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 28px 48px 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .filter-btn {
    font-size: .60rem; font-weight: 500;
    letter-spacing: .16em; text-transform: uppercase;
    padding: 7px 16px;
    border: 1px solid rgba(240,236,233,.15);
    background: transparent;
    color: rgba(240,236,233,.45);
    cursor: pointer;
    transition: all .2s;
  }
  .filter-btn:hover { color: #F0ECE9; border-color: rgba(240,236,233,.4); }
  .filter-btn.active {
    background: #1F3260;
    border-color: #1F3260;
    color: #F0ECE9;
  }

  /* ── GRID ── */
  .grid-wrap {
    padding: 32px 48px 80px;
  }
  .group-label {
    font-size: .58rem; font-weight: 600;
    letter-spacing: .22em; text-transform: uppercase;
    color: rgba(240,236,233,.25);
    padding: 32px 0 16px;
    border-top: 1px solid rgba(240,236,233,.06);
    margin-top: 8px;
  }
  .group-label:first-child { border-top: none; margin-top: 0; padding-top: 0; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 2px;
  }

  /* ── CARD ── */
  .card {
    background: #181D38;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .3s cubic-bezier(.16,1,.3,1);
    border: 1px solid rgba(240,236,233,.04);
  }
  .card:hover { transform: translateY(-3px); border-color: rgba(240,236,233,.14); }
  .card:hover .card-overlay { opacity: 1; }
  .card:hover .card-cta { opacity: 1; transform: translateY(0); }
  .card:hover .thumb { transform: scale(1.03); filter: brightness(.65) saturate(.7); }

  .thumb-wrap { position: relative; overflow: hidden; height: 210px; }
  .thumb {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top;
    display: block;
    filter: brightness(.75) saturate(.7);
    transition: transform .6s cubic-bezier(.16,1,.3,1), filter .4s ease;
  }
  /* Gradient fade into card */
  .thumb-wrap::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(to top, #181D38, transparent);
    pointer-events: none; z-index: 1;
  }

  .card-overlay {
    position: absolute; inset: 0;
    background: rgba(31,50,96,.3);
    opacity: 0; transition: opacity .25s;
    z-index: 2;
  }

  .card-body {
    padding: 20px 24px 24px;
  }
  .card-group {
    font-size: .55rem; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase;
    color: rgba(240,236,233,.3);
    margin-bottom: 6px;
  }
  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; font-weight: 400;
    color: #F0ECE9; line-height: 1.2;
    margin-bottom: 16px;
  }
  .card-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    border-top: 1px solid rgba(240,236,233,.07);
    padding-top: 14px;
  }
  .card-file {
    font-size: .62rem; font-weight: 300;
    color: rgba(240,236,233,.25);
    font-family: 'Courier New', monospace;
    letter-spacing: .02em;
  }
  .card-cta {
    font-size: .60rem; font-weight: 500;
    letter-spacing: .14em; text-transform: uppercase;
    color: #A8A09A;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity .2s, transform .25s;
  }
  .card-cta::after { content: ' ›'; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,12,22,.94);
    backdrop-filter: blur(8px);
    align-items: center; justify-content: center;
    padding: 40px;
    animation: lbIn .2s ease;
  }
  .lightbox.open { display: flex; }
  @keyframes lbIn { from { opacity:0; transform:scale(.97) } to { opacity:1; transform:scale(1) } }

  .lb-inner {
    max-width: 1100px; width: 100%;
    background: #181D38;
    border: 1px solid rgba(240,236,233,.1);
    overflow: hidden;
  }
  .lb-header {
    padding: 20px 28px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(240,236,233,.08);
  }
  .lb-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem; font-weight: 400; color: #F0ECE9;
  }
  .lb-group {
    font-size: .58rem; font-weight: 600;
    letter-spacing: .18em; text-transform: uppercase;
    color: rgba(240,236,233,.3);
    margin-top: 2px;
  }
  .lb-actions {
    display: flex; gap: 12px; align-items: center;
  }
  .lb-link {
    font-size: .60rem; font-weight: 500;
    letter-spacing: .14em; text-transform: uppercase;
    color: #A8A09A; text-decoration: none;
    border: 1px solid rgba(240,236,233,.15);
    padding: 7px 14px;
    transition: all .2s;
  }
  .lb-link:hover { color: #F0ECE9; border-color: rgba(240,236,233,.4); }
  .lb-close {
    background: none; border: none; cursor: pointer;
    color: rgba(240,236,233,.4); font-size: 1.4rem;
    line-height: 1; padding: 4px 8px;
    transition: color .2s;
  }
  .lb-close:hover { color: #F0ECE9; }
  .lb-img-wrap {
    position: relative; overflow: hidden;
    max-height: 600px;
  }
  .lb-img {
    width: 100%; display: block;
    object-fit: cover; object-position: top;
  }
  .lb-nav {
    display: flex; gap: 2px;
    border-top: 1px solid rgba(240,236,233,.08);
  }
  .lb-prev, .lb-next {
    flex: 1; padding: 14px;
    background: none; border: none; cursor: pointer;
    font-size: .60rem; font-weight: 500;
    letter-spacing: .14em; text-transform: uppercase;
    color: rgba(240,236,233,.35);
    transition: all .2s;
    display: flex; align-items: center; gap: 8px;
  }
  .lb-prev:hover, .lb-next:hover {
    background: rgba(255,255,255,.03);
    color: #F0ECE9;
  }
  .lb-next { justify-content: flex-end; }


  @media(max-width:768px) {
    .header { padding: 16px 20px; }
    .filter-bar { padding: 20px 20px 0; }
    .grid-wrap { padding: 24px 20px 80px; }
    .cards { grid-template-columns: 1fr; }
  }
  @media(max-width:430px) {
    .header { padding: 12px 16px; }
    .header-brand { font-size: .9rem; }
    .filter-bar { padding: 16px 16px 0; gap: 6px; }
    .filter-btn { font-size: .58rem; padding: 6px 10px; min-height: 36px; }
    .grid-wrap { padding: 16px 16px 40px; }
    .cards { grid-template-columns: 1fr; gap: 12px; }
    .group-label { font-size: .6rem; margin: 16px 0 8px; }
    .lb-close { top: 12px; right: 12px; font-size: 1.5rem; }
    .lb-counter { bottom: 12px; right: 12px; font-size: .6rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-brand">MNSR Capital</div>
    <div class="header-sub">Site Review Dashboard</div>
  </div>
  <div style="text-align:right">
    <div class="page-count" id="visibleCount">17</div>
    <div class="header-meta">pages</div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('All')">All Pages</button>
  <button class="filter-btn" onclick="filter('Main')">Main</button>
  <button class="filter-btn" onclick="filter('Platform')">Platform</button>
  <button class="filter-btn" onclick="filter('Regions')">Regions</button>
  <button class="filter-btn" onclick="filter('Sectors')">Sectors</button>
</div>

<div class="grid-wrap" id="gridWrap"></div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <div class="lb-inner" onclick="event.stopPropagation()">
    <div class="lb-header">
      <div>
        <div class="lb-title" id="lbTitle"></div>
        <div class="lb-group" id="lbGroup"></div>
      </div>
      <div class="lb-actions">
        <a class="lb-link" id="lbLink" href="#" target="_blank">Open Page ›</a>
        <button class="lb-close" onclick="closeLightboxBtn()">×</button>
      </div>
    </div>
    <div class="lb-img-wrap">
      <img class="lb-img" id="lbImg" src="" alt="">
    </div>
    <div class="lb-nav">
      <button class="lb-prev" onclick="navLightbox(-1)">‹ Previous</button>
      <button class="lb-next" onclick="navLightbox(1)">Next ›</button>
    </div>
  </div>
</div>

];

let currentFilter = 'All';
let lightboxIndex = 0;
let visiblePages = [];

function render() {
  const wrap = document.getElementById('gridWrap');
  visiblePages = PAGES.filter(p => currentFilter === 'All' || p.group === currentFilter);
  document.getElementById('visibleCount').textContent = visiblePages.length;

  const groups = [...new Set(visiblePages.map(p => p.group))];
  wrap.innerHTML = '';

  groups.forEach(group => {
    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = group;
    wrap.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'cards';

    visiblePages.filter(p => p.group === group).forEach((page, i) => {
      const globalIdx = visiblePages.indexOf(page);
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="thumb-wrap">
          <img class="thumb" src="${page.thumb}" alt="${page.label}">
        </div>
        <div class="card-overlay"></div>
        <div class="card-body">
          <div class="card-group">${page.group}</div>
          <div class="card-title">${page.label}</div>
          <div class="card-footer">
            <span class="card-file">${page.file}</span>
            <span class="card-cta">Preview</span>
          </div>
        </div>
      `;
      card.onclick = () => openLightbox(globalIdx);
      grid.appendChild(card);
    });

    wrap.appendChild(grid);
  });
}

function filter(group) {
  currentFilter = group;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(group) || (group === 'All' && b.textContent === 'All Pages'));
  });
  render();
}

function openLightbox(idx) {
  lightboxIndex = idx;
  const page = visiblePages[idx];
  document.getElementById('lbTitle').textContent = page.label;
  document.getElementById('lbGroup').textContent = page.group;
  document.getElementById('lbImg').src = page.thumb;
  document.getElementById('lbLink').href = page.file;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(e) {
  document.getElementById('lightbox').classList.remove('open');
}
function closeLightboxBtn() {
  document.getElementById('lightbox').classList.remove('open');
}

function navLightbox(dir) {
  lightboxIndex = (lightboxIndex + dir + visiblePages.length) % visiblePages.length;
  openLightbox(lightboxIndex);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightboxBtn();
  if (e.key === 'ArrowRight') navLightbox(1);
  if (e.key === 'ArrowLeft') navLightbox(-1);
});

render();
</script>
